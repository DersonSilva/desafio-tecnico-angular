<div class="w-full bg-zinc-700 border-b border-gray-700 px-4 py-3 flex items-center">
  <div class="flex items-center gap-2">
    <button mat-icon-button class="text-white">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="text-white font-medium tracking-wide leading-none"> USUÁRIOS </span>
  </div>

  <div class="ml-14 flex-1 max-w-lg">
    <app-search-user (searchChange)="onSearch($event)"></app-search-user>
  </div>
</div>

<div class="relative">
  <div class="p-6 max-w-5xl mx-auto">
    <ng-container *ngIf="error()">
      <app-error-message [message]="error() || ''"></app-error-message>
    </ng-container>

    <h2 class="text-gray-700 text-sm font-medium mb-3">Usuários cadastrados</h2>

    <ng-container *ngIf="paginatedUsers().length > 0; else emptyState">
      <div class="space-y-3 mb-4">
        <app-user-card
          *ngFor="let user of paginatedUsers()"
          [user]="user"
          (edit)="onOpenModal($event)"
        >
        </app-user-card>
      </div>

      <!-- PAGINADOR -->
      <mat-paginator
        [length]="filteredUsers().length"
        [pageSize]="pageSize()"
        [pageIndex]="pageIndex()"
        [pageSizeOptions]="[5, 10, 20]"
        (page)="onPageChange($event)"
      >
      </mat-paginator>
    </ng-container>

    <ng-template #emptyState>
      <p class="text-center text-gray-500 mt-4">Nenhum usuário encontrado.</p>
    </ng-template>
  </div>

  <ng-container *ngIf="loading()">
    <div class="absolute inset-0 bg-white/70 flex items-center justify-center z-50">
      <app-loading-spinner></app-loading-spinner>
    </div>
  </ng-container>
</div>

<app-fab-button (clicked)="onOpenModal()"></app-fab-button>
