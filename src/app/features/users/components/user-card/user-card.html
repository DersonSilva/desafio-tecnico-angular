<div class="bg-white p-4 shadow-sm grid grid-cols-[40px_1fr_1fr_40px] items-center mb-3">
  <mat-icon class="text-gray-400">person</mat-icon>

  <span class="font-semibold text-gray-800 truncate">
    {{ user.name }}
  </span>

  <span class="text-sm text-gray-500 truncate text-start">
    {{ user.email }}
  </span>

  <button mat-icon-button (click)="edit.emit(user)">
    <mat-icon>edit</mat-icon>
  </button>
</div>
